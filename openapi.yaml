openapi: 3.1.0
info:
  title: Exchange Rate API
  description: API to get exchange rates for GBP and USD to ZAR
  version: 1.0.0

servers:
  - url: https://lisajwa.pythonanywhere.com
    description:  Lisa development server

paths:
  /:
    get:
      summary: Health check endpoint
      description: Returns a simple message to verify the plugin is working
      operationId: index
      responses:
        '200':
          description: Plugin is operational
          content:
            text/plain:
              schema:
                type: string
                example: "Your exchange rate api plugin is working"

  /GBPRate:
    get:
      summary: Get GBP to ZAR exchange rate
      description: Returns the current exchange rate from GBP to ZAR
      operationId: get_gbp_rate
      security:
        - bearerAuth: []

      responses:
        '200':
          description: Successful response with exchange rate or error message
          content:
            text/plain:
              schema:
                type: string
                example: "23.45"
        '401':
          description: Missing or invalid authorization header
          content:
            text/plain:
              schema:
                type: string
                example: "The authorization header is missing a Bearer token key or doesn't match the required key."

  /USDRate:
    get:
      summary: Get USD to ZAR exchange rate
      description: Returns the current exchange rate from USD to ZAR
      operationId: get_usd_rate
      security:
        - bearerAuth: []

      responses:
        '200':
          description: Successful response with exchange rate or error message
          content:
            text/plain:
              schema:
                type: string
                example: "18.50"
        '401':
          description: Missing or invalid authorization header
          content:
            text/plain:
              schema:
                type: string
                example: "The authorization header is missing a Bearer token key or doesn't match the required key."


components:
  schemas: {}
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: APIKey