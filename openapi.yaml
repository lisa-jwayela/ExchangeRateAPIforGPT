openapi: 3.1.0
info:
  title: Exchange Rate API
  description: API to get exchange rates for GBP and USD to ZAR
  version: 1.0.0

servers:
  - url: https://lisajwa.pythonanywhere.com
    description:  Lisa development server

paths:
  /:
    get:
      summary: Health check endpoint
      description: Returns a simple message to verify the plugin is working
      operationId: index
      responses:
        '200':
          description: Plugin is operational
          content:
            text/plain:
              schema:
                type: string
                example: "Health Check: Your exchange rate API plugin is working"

  /GBPRate:
    get:
      summary: Get GBP to ZAR exchange rate
      description: Returns the current exchange rate from GBP to ZAR as plain text
      operationId: get_gbp_rate
      security:
        - bearerAuth: []

      responses:
        '200':
          description: Successful response with the GBP to ZAR exchange rate
          content:
            text/plain:
              schema:
                type: string
                example: "23.45"
        '401':
          description: Missing or invalid authorization header
          content:
            text/plain:
              schema:
                type: string
                example: "The authorization header is missing a Bearer token key or doesn't match the required key."
        '500':
          description: Required environment variables are missing
          content:
            text/plain:
              schema:
                type: string
                example: "Missing EXCHANGE_RATE_API_KEY or SERVICE_AUTH_KEY environment variable."
        '502':
          description: Upstream exchange rate provider failed or returned an unexpected payload
          content:
            text/plain:
              schema:
                type: string
                examples:
                  upstreamRequestFailed:
                    value: "Failed to reach the exchange rate API: 503 Server Error"
                  unexpectedPayload:
                    value: "Unexpected response from the exchange rate API: 'conversion_rates'"
        '504':
          description: Upstream exchange rate provider timed out
          content:
            text/plain:
              schema:
                type: string
                example: "The exchange rate API request timed out. Please try again later."

  /USDRate:
    get:
      summary: Get USD to ZAR exchange rate
      description: Returns the current exchange rate from USD to ZAR as plain text
      operationId: get_usd_rate
      security:
        - bearerAuth: []

      responses:
        '200':
          description: Successful response with the USD to ZAR exchange rate
          content:
            text/plain:
              schema:
                type: string
                example: "18.50"
        '401':
          description: Missing or invalid authorization header
          content:
            text/plain:
              schema:
                type: string
                example: "The authorization header is missing a Bearer token key or doesn't match the required key."
        '500':
          description: Required environment variables are missing
          content:
            text/plain:
              schema:
                type: string
                example: "Missing EXCHANGE_RATE_API_KEY or SERVICE_AUTH_KEY environment variable."
        '502':
          description: Upstream exchange rate provider failed or returned an unexpected payload
          content:
            text/plain:
              schema:
                type: string
                examples:
                  upstreamRequestFailed:
                    value: "Failed to reach the exchange rate API: 503 Server Error"
                  unexpectedPayload:
                    value: "Unexpected response from the exchange rate API: 'conversion_rates'"
        '504':
          description: Upstream exchange rate provider timed out
          content:
            text/plain:
              schema:
                type: string
                example: "The exchange rate API request timed out. Please try again later."


components:
  schemas: {}
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
